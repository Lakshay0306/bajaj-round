<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BFHL API Challenge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h2>BFHL Node Processor</h2>
    </header>

    <div class="content">
      <div class="input-group">
        <label for="json-input">Enter Node List (JSON format):</label>
        <textarea id="json-input" placeholder='{ "data": ["A->B", "A->C", "B->D"] }'></textarea>
        <button id="submit-btn">Submit Request</button>
        <p id="error-message" class="error"></p>
      </div>

      <div class="output-group">
        <label>API Response:</label>
        <div id="output-container" class="output-box">
          <pre id="json-output">Results will appear here...</pre>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
